<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT DNA - SACCO Assist AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; }
.hidden { display: none; }
</style>
</head>
<body class="bg-gray-100">

<!-- LOGIN PAGE -->
<div id="loginPage" class="flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-green-700 mb-6">PROJECT DNA</h2>
    <input id="username" type="text" placeholder="Username"
      class="w-full p-3 border rounded-lg mb-4">
    <select id="role" class="w-full p-3 border rounded-lg mb-4">
      <option value="member">Member</option>
      <option value="admin">Admin</option>
    </select>
    <button onclick="login()"
      class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">
      Login
    </button>
  </div>
</div>

<!-- MEMBER DASHBOARD -->
<div id="memberDashboard" class="hidden p-6">
  <h1 class="text-2xl font-bold text-green-700 mb-4">Member Dashboard</h1>

  <div class="grid md:grid-cols-3 gap-6 mb-6">
    <div class="bg-white p-4 rounded-xl shadow">
      <h3 class="font-semibold">Savings Balance</h3>
      <p id="savingsBalance" class="text-xl font-bold text-green-600">UGX 0</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <h3 class="font-semibold">Loan Balance</h3>
      <p id="loanBalance" class="text-xl font-bold text-red-500">UGX 0</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <h3 class="font-semibold">Credit Score</h3>
      <p id="creditScore" class="text-xl font-bold text-blue-600">0</p>
    </div>
  </div>

  <!-- Savings -->
  <div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="font-semibold mb-4">Deposit Savings</h2>
    <input id="depositAmount" type="number" placeholder="Amount"
      class="p-3 border rounded-lg w-full mb-3">
    <button onclick="depositSavings()"
      class="bg-green-600 text-white p-3 rounded-lg w-full">
      Deposit
    </button>
  </div>

  <!-- Loan -->
  <div class="bg-white p-6 rounded-xl shadow mb-6">
    <h2 class="font-semibold mb-4">Request Loan</h2>
    <input id="loanAmount" type="number" placeholder="Loan Amount"
      class="p-3 border rounded-lg w-full mb-3">
    <button onclick="requestLoan()"
      class="bg-blue-600 text-white p-3 rounded-lg w-full">
      Request Loan
    </button>
  </div>

  <!-- AI Coach -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="font-semibold mb-4">AI Wealth Coach</h2>
    <textarea id="aiQuestion"
      class="p-3 border rounded-lg w-full mb-3"
      placeholder="Ask: How can I grow my savings?"></textarea>
    <button onclick="askAI()"
      class="bg-purple-600 text-white p-3 rounded-lg w-full mb-3">
      Ask AI
    </button>
    <div id="aiResponse" class="text-gray-700"></div>
  </div>

  <button onclick="logout()"
    class="mt-6 text-red-600 underline">
    Logout
  </button>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDashboard" class="hidden p-6">
  <h1 class="text-2xl font-bold text-green-700 mb-4">Admin Dashboard</h1>

  <div class="grid md:grid-cols-3 gap-6 mb-6">
    <div class="bg-white p-4 rounded-xl shadow">
      <h3>Total Savings Pool</h3>
      <p id="totalSavings" class="text-xl font-bold text-green-600">UGX 0</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <h3>Total Loan Portfolio</h3>
      <p id="totalLoans" class="text-xl font-bold text-red-500">UGX 0</p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <h3>Liquidity Ratio</h3>
      <p id="liquidityRatio" class="text-xl font-bold text-blue-600">0%</p>
    </div>
  </div>

  <button onclick="logout()"
    class="text-red-600 underline">
    Logout
  </button>
</div>

<script>
let savings = localStorage.getItem("savings") ? parseFloat(localStorage.getItem("savings")) : 0;
let loan = localStorage.getItem("loan") ? parseFloat(localStorage.getItem("loan")) : 0;

function login() {
  let role = document.getElementById("role").value;
  document.getElementById("loginPage").classList.add("hidden");

  if(role === "member") {
    document.getElementById("memberDashboard").classList.remove("hidden");
    updateMemberUI();
  } else {
    document.getElementById("adminDashboard").classList.remove("hidden");
    updateAdminUI();
  }
}

function logout() {
  location.reload();
}

function depositSavings() {
  let amount = parseFloat(document.getElementById("depositAmount").value);
  if(amount > 0) {
    savings += amount;
    localStorage.setItem("savings", savings);
    updateMemberUI();
  }
}

function requestLoan() {
  let amount = parseFloat(document.getElementById("loanAmount").value);
  if(amount <= savings * 3) {
    loan += amount;
    localStorage.setItem("loan", loan);
    updateMemberUI();
  } else {
    alert("Loan exceeds 3x savings limit.");
  }
}

function updateMemberUI() {
  document.getElementById("savingsBalance").innerText = "UGX " + savings.toLocaleString();
  document.getElementById("loanBalance").innerText = "UGX " + loan.toLocaleString();
  document.getElementById("creditScore").innerText = calculateCreditScore();
}

function updateAdminUI() {
  document.getElementById("totalSavings").innerText = "UGX " + savings.toLocaleString();
  document.getElementById("totalLoans").innerText = "UGX " + loan.toLocaleString();
  let ratio = savings > 0 ? ((savings - loan)/savings)*100 : 0;
  document.getElementById("liquidityRatio").innerText = ratio.toFixed(1) + "%";
}

function calculateCreditScore() {
  let score = 50;
  if(savings > 1000000) score += 20;
  if(loan === 0) score += 20;
  if(loan > savings * 2) score -= 20;
  return score;
}

function askAI() {
  let question = document.getElementById("aiQuestion").value.toLowerCase();
  let response = "";

  if(question.includes("grow")) {
    response = "Increase monthly savings by 20% and avoid high loan ratios. Consider fixed savings products.";
  } else if(question.includes("loan")) {
    response = "Your loan limit is 3x your savings. Improve savings to increase borrowing capacity.";
  } else {
    response = "Stay consistent with savings and maintain healthy liquidity.";
  }

  document.getElementById("aiResponse").innerText = response;
}
</script>

</body>
</html>
