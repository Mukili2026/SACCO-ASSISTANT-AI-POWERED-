<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SACCO Assistant — AI for SACCOs in Africa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #00A651 0%, #1E2A44 100%); }
  </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E2A44]">

  <!-- Your existing navbar and hero (unchanged) -->

  <!-- Example: Paystack on Pricing Buttons -->
  <button onclick="payWithPaystack(49000)" 
    class="px-12 py-6 bg-[#00A651] text-white font-semibold text-xl rounded-3xl hover:scale-105 transition">
    Start Growth Plan – UGX 49,000/month
  </button>

  <!-- Footer disclaimer (already there) -->

  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#00A651', accent: '#FF9F1C' } } } };

    function payWithPaystack(amount) {
      let handler = PaystackPop.setup({
        key: 'pk_test_8f1e9f0e3d5a2b7c4d6e8f9a0b1c2d3e4f5a6b7c', // ← TEST KEY (replace with your LIVE key later)
        email: 'geoffrey@saccoassistant.com',
        amount: amount * 100, // Paystack uses kobo (UGX × 100)
        currency: 'UGX',
        ref: 'SACCO_' + Math.floor((Math.random() * 1000000000) + 1),
        callback: function(response) {
          alert('✅ Payment successful! Reference: ' + response.reference);
          // In real app: send reference to your backend to verify & activate subscription
        },
        onClose: function() {
          alert('Payment window closed');
        }
      });
      handler.openIframe();
    }
  </script>
</body>
</html>
