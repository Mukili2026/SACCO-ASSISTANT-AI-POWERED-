<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login • SACCO Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E2A44] min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full">
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-[#00A651] rounded-3xl flex items-center justify-center text-white text-4xl">🌱</div>
        <span class="heading text-4xl font-bold text-[#00A651]">SACCO Assistant</span>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8">
      <h1 class="heading text-3xl font-bold text-center mb-2">Welcome back</h1>
      <p class="text-center opacity-70 mb-8">Login to your SACCO or VSLA</p>

      <div class="space-y-6">
        <div>
          <label class="block text-sm opacity-70 mb-2">Phone number</label>
          <input id="login-input" type="text" value="+256 700 123 456" class="w-full border border-gray-300 rounded-3xl px-6 py-5 outline-none text-base">
        </div>

        <div>
          <label class="block text-sm opacity-70 mb-2">Security PIN (4 digits)</label>
          <input id="pin-input" type="password" maxlength="4" placeholder="••••" class="w-full border border-gray-300 rounded-3xl px-6 py-5 outline-none text-3xl tracking-widest text-center">
        </div>

        <button onclick="performLogin()" class="w-full bg-[#00A651] text-white font-semibold py-6 rounded-3xl text-lg">Login Securely</button>

        <button onclick="showUSSDLogin()" class="w-full border-2 border-[#FF9F1C] text-[#FF9F1C] font-medium py-5 rounded-3xl flex items-center justify-center gap-3">
          <i class="fa-solid fa-mobile-screen-button"></i> Login with USSD *123#
        </button>
      </div>
    </div>

    <div class="text-center mt-8 text-xs opacity-60">
      <i class="fa-solid fa-shield-halved text-[#00A651]"></i> Bank-level security
    </div>
  </div>

  <script>
    function performLogin() {
      if (document.getElementById('pin-input').value.length === 4) {
        alert("✅ Login successful! Welcome back 👋");
        window.location.href = "demo.html";
      } else {
        alert("Please enter 4-digit PIN");
      }
    }
    function showUSSDLogin() {
      alert("USSD Login: Dial *123*4# on your phone");
    }
  </script>
</body>
</html>
