<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founder Dashboard • SACCO Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E2A44] min-h-screen">

  <div class="max-w-4xl mx-auto p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-10">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-[#00A651] rounded-3xl flex items-center justify-center text-white text-4xl">🌱</div>
        <div>
          <span class="heading text-3xl font-bold text-[#00A651]">SACCO Assistant</span>
          <p class="text-sm opacity-70">Founder Dashboard — Geoffrey Obia</p>
        </div>
      </div>
      <button onclick="window.location.href='demo.html'" 
        class="px-8 py-3 border-2 border-[#00A651] text-[#00A651] rounded-3xl font-medium hover:bg-[#00A651] hover:text-white transition">
        ← Back to App
      </button>
    </div>

    <!-- Total Revenue -->
    <div class="bg-white rounded-3xl p-10 text-center mb-10 shadow">
      <p class="text-sm opacity-70">Total Revenue This Month</p>
      <p id="total-revenue" class="text-6xl font-bold text-[#00A651] mt-3">3,284,750 UGX</p>
      <p class="text-emerald-600 mt-2 flex items-center justify-center gap-2">
        <span class="text-lg">↑</span> 24% from last month
      </p>
    </div>

    <!-- Breakdown & Portfolio Health (kept clean) -->
    <!-- ... (same beautiful cards as before) ... -->

    <!-- Flutterwave Payment Button -->
    <button onclick="payWithFlutterwave(49000)" 
      class="w-full bg-[#00A651] hover:bg-[#006600] text-white py-7 rounded-3xl font-semibold text-lg mb-8 transition">
      💳 Test Real Payment (UGX 49,000) – Flutterwave
    </button>

    <!-- Recent Activity & Disclaimer -->
    <!-- ... (same as previous version) ... -->
  </div>

  <script>
    function payWithFlutterwave(amount) {
      FlutterwaveCheckout({
        public_key: "FLWPUBK_TEST-XXXXXXXXXXXXXXX-X",   // ← Replace with your LIVE key later
        tx_ref: "SACCO-" + Date.now(),
        amount: amount,
        currency: "UGX",
        payment_options: "mobilemoney,card,banktransfer",
        customer: {
          email: "geoffrey@saccoassistant.com",
          name: "Geoffrey Obia"
        },
        customizations: {
          title: "SACCO Assistant Subscription",
          description: "Monthly Growth Plan",
          logo: "https://sacco-assistant-ai-powered.vercel.app/logo.png"
        },
        callback: function(response) {
          alert("✅ Payment successful!\nTransaction ID: " + response.transaction_id);
          // In future: send to your backend to verify
        },
        onclose: function() {
          console.log("Payment modal closed");
        }
      });
    }
  </script>
</body>
</html>
