<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SACCO Assistant - Live Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
    .chat-bubble-ai { background: #00A651; color: white; }
    .chat-bubble-user { background: #FF9F1C; color: white; }
    .chat-bubble-member { background: #1E2A44; color: white; }
    .nav-active { border-top: 3px solid #00A651; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E2A44] min-h-screen pb-20">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 right-0 bg-white border-b z-50">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-[#00A651] rounded-xl flex items-center justify-center text-white text-xl">🌱</div>
        <span class="heading text-2xl font-bold text-[#00A651]">SACCO Assistant</span>
      </div>
      <button onclick="togglePersona()" id="persona-btn" class="flex items-center gap-1.5 text-sm font-medium px-3 py-1 rounded-full bg-[#F8FAFC]">
        <span id="persona-name">Mama Amina</span>
      </button>
    </div>
  </header>

  <div class="max-w-xl mx-auto pt-16">

    <!-- PERSONAL CHAT (unchanged - simple) -->
    <div id="screen-chat" class="screen">
      <div class="h-[calc(100vh-180px)] overflow-y-auto p-4 space-y-4" id="chat-messages"></div>
      <div class="fixed bottom-20 left-0 right-0 max-w-xl mx-auto bg-white border-t p-4">
        <div class="flex gap-2">
          <button onclick="simulateVoice()" class="flex-1 bg-[#00A651] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-microphone"></i> Voice
          </button>
          <button onclick="showUSSD()" class="flex-1 bg-[#FF9F1C] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-mobile-screen-button"></i> USSD
          </button>
        </div>
      </div>
      <div class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white p-4 border-t">
        <div class="flex gap-2">
          <input id="chat-input" type="text" placeholder="Ask anything..." class="flex-1 bg-white border border-gray-300 rounded-3xl px-6 py-4 outline-none text-base">
          <button onclick="sendMessage()" class="w-14 h-14 bg-[#00A651] rounded-3xl flex items-center justify-center text-white text-2xl">↑</button>
        </div>
      </div>
    </div>

    <!-- REVENUE & SECURITY (unchanged - simple) -->
    <div id="screen-dashboard" class="screen hidden p-4 pt-6">...</div>
    <div id="screen-alerts" class="screen hidden p-4 pt-6">...</div>

    <!-- REVISED VSLA GROUP CHAT -->
    <div id="screen-vsla" class="screen hidden">
      <div class="p-4 border-b bg-white">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#FF9F1C] rounded-2xl flex items-center justify-center text-white text-2xl">👥</div>
            <div>
              <p class="heading font-semibold">Mukono Women VSLA</p>
              <p class="text-xs opacity-70">18 members • Today’s meeting</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="p-4 bg-white border-b flex gap-2 overflow-x-auto">
        <button onclick="recordAttendance()" class="px-5 py-3 bg-white border border-[#00A651] text-[#00A651] text-sm font-medium rounded-3xl whitespace-nowrap">✅ Mark Attendance</button>
        <button onclick="recordShareOut()" class="px-5 py-3 bg-white border border-[#00A651] text-[#00A651] text-sm font-medium rounded-3xl whitespace-nowrap">💰 Record Share-out</button>
        <button onclick="requestGroupLoan()" class="px-5 py-3 bg-white border border-[#FF9F1C] text-[#FF9F1C] text-sm font-medium rounded-3xl whitespace-nowrap">📋 Request Loan</button>
      </div>

      <div class="h-[calc(100vh-340px)] overflow-y-auto p-4 space-y-4" id="vsla-messages"></div>

      <div class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white p-4 border-t">
        <div class="flex gap-2">
          <input id="vsla-input" type="text" placeholder="Message the group..." class="flex-1 bg-white border border-gray-300 rounded-3xl px-6 py-4 outline-none text-base">
          <button onclick="sendGroupMessage()" class="w-14 h-14 bg-[#00A651] rounded-3xl flex items-center justify-center text-white text-2xl">↑</button>
        </div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white border-t">
    <div class="flex text-xs">
      <button onclick="showScreen('chat')" class="flex-1 py-3 nav-active flex flex-col items-center gap-1 text-[#00A651]" id="nav-chat"><i class="fa-solid fa-comment-dots text-xl"></i><span>Chat</span></button>
      <button onclick="showScreen('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-dashboard"><i class="fa-solid fa-chart-line text-xl"></i><span>Revenue</span></button>
      <button onclick="showScreen('alerts')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-alerts"><i class="fa-solid fa-shield-halved text-xl"></i><span>Security</span></button>
      <button onclick="showScreen('vsla')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-vsla"><i class="fa-solid fa-users text-xl"></i><span>VSLA</span></button>
    </div>
  </nav>

  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#00A651', accent: '#FF9F1C' } } } };

    let currentPersona = 'Mama Amina';
    let vslaMessages = [
      { from: "Grace", text: "Good morning sisters! Did everyone receive their share-out this month?", time: "09:12" }
    ];

    function renderVSLA() {
      const container = document.getElementById('vsla-messages');
      container.innerHTML = '';
      vslaMessages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'max-w-[80%] rounded-3xl px-5 py-3 ' + 
          (m.from === "AI Assistant" ? 'chat-bubble-ai ml-auto' : 
           m.from === currentPersona ? 'chat-bubble-user mr-auto' : 'chat-bubble-member mr-auto');
        div.innerHTML = `<small class="opacity-70 block text-xs">${m.from} • ${m.time}</small>${m.text}`;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    function recordAttendance() {
      vslaMessages.push({ from: currentPersona, text: "✅ I am present for today's meeting", time: "now" });
      renderVSLA();
      setTimeout(() => {
        vslaMessages.push({ from: "AI Assistant", text: "Attendance updated. 14 of 18 members present. Well done!", time: "now" });
        renderVSLA();
      }, 600);
    }

    function recordShareOut() {
      vslaMessages.push({ from: currentPersona, text: "💰 I have received my share-out of 25,000 UGX today", time: "now" });
      renderVSLA();
      setTimeout(() => {
        vslaMessages.push({ from: "AI Assistant", text: "Share-out recorded for Mama Amina. Thank you! Total collected today: 325,000 UGX.", time: "now" });
        renderVSLA();
      }, 600);
    }

    function requestGroupLoan() {
      vslaMessages.push({ from: currentPersona, text: "📋 I would like to request a group loan of 150,000 UGX for seeds", time: "now" });
      renderVSLA();
      setTimeout(() => {
        vslaMessages.push({ from: "AI Assistant", text: "Loan request noted. 1% charge will apply if approved. Shall I add it to the agenda?", time: "now" });
        renderVSLA();
      }, 700);
    }

    function sendGroupMessage() {
      const input = document.getElementById('vsla-input');
      if (!input.value.trim()) return;
      vslaMessages.push({ from: currentPersona, text: input.value, time: "now" });
      renderVSLA();
      input.value = '';
    }

    function togglePersona() {
      currentPersona = currentPersona === 'Mama Amina' ? 'Joseph' : 'Mama Amina';
      document.getElementById('persona-name').textContent = currentPersona;
    }

    function showScreen(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(`screen-${screen}`).classList.remove('hidden');
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
      document.getElementById(`nav-${screen}`).classList.add('nav-active');
      if (screen === 'vsla') renderVSLA();
    }

    // Simple placeholders for other screens
    function sendMessage() { alert("Personal chat message sent (demo)"); }
    function simulateVoice() { alert("Voice message to personal assistant sent"); }
    function showUSSD() { alert("USSD *123# opened"); }

    window.onload = () => {
      renderVSLA();
      showScreen('chat');
    };
  </script>
</body>
</html>
