<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SACCO Assistant - Live Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
    .chat-bubble-ai { background: #00A651; color: white; }
    .chat-bubble-user { background: #FF9F1C; color: white; }
    .chat-bubble-member { background: #1E2A44; color: white; }
    .nav-active { border-top: 3px solid #00A651; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E2A44] min-h-screen pb-20">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 right-0 bg-white border-b z-50">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-[#00A651] rounded-xl flex items-center justify-center text-white text-xl">🌱</div>
        <span class="heading text-2xl font-bold text-[#00A651]">SACCO Assistant</span>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="togglePersona()" id="persona-btn" class="flex items-center gap-1.5 text-sm font-medium px-3 py-1 rounded-full bg-[#F8FAFC]">
          <span id="persona-name">Mama Amina</span>
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-xl mx-auto pt-16">

    <!-- PERSONAL CHAT -->
    <div id="screen-chat" class="screen">
      <div class="h-[calc(100vh-180px)] overflow-y-auto p-4 space-y-4" id="chat-messages"></div>
      <div class="fixed bottom-20 left-0 right-0 max-w-xl mx-auto bg-white border-t p-4">
        <div class="flex gap-2">
          <button onclick="simulateVoice()" class="flex-1 bg-[#00A651] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-microphone"></i> Voice
          </button>
          <button onclick="showUSSD()" class="flex-1 bg-[#FF9F1C] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-mobile-screen-button"></i> USSD
          </button>
        </div>
      </div>
      <div class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white p-4 border-t">
        <div class="flex gap-2">
          <input id="chat-input" type="text" placeholder="Ask anything..." class="flex-1 bg-white border border-gray-300 rounded-3xl px-6 py-4 outline-none">
          <button onclick="sendMessage()" class="w-14 h-14 bg-[#00A651] rounded-3xl flex items-center justify-center text-white text-2xl">↑</button>
        </div>
      </div>
    </div>

    <!-- REVENUE DASHBOARD -->
    <div id="screen-dashboard" class="screen hidden p-4 pt-6">
      <h1 class="heading text-3xl font-bold mb-6 text-[#00A651]">Revenue & Sustainability</h1>
      <div class="bg-white rounded-3xl p-6 mb-6">
        <p class="text-4xl font-semibold text-[#00A651]">1,250,000 UGX</p>
        <p class="text-sm opacity-70">This month total</p>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white rounded-3xl p-5"><p class="text-sm opacity-70">Subscription fees</p><p class="text-2xl font-semibold">450,000 UGX</p></div>
        <div class="bg-white rounded-3xl p-5"><p class="text-sm opacity-70">Transaction fees</p><p class="text-2xl font-semibold">320,000 UGX</p></div>
        <div class="bg-white rounded-3xl p-5"><p class="text-sm opacity-70">1% Loan charges</p><p class="text-2xl font-semibold">180,000 UGX</p></div>
        <div class="bg-white rounded-3xl p-5"><p class="text-sm opacity-70">Other commissions</p><p class="text-2xl font-semibold">150,000 UGX</p></div>
      </div>
    </div>

    <!-- SECURITY -->
    <div id="screen-alerts" class="screen hidden p-4 pt-6">
      <h1 class="heading text-3xl font-bold mb-8 text-[#00A651]">Security Alerts</h1>
      <button onclick="triggerCriticalAlert()" class="w-full bg-[#E63946] text-white py-6 rounded-3xl text-lg font-medium mb-4">🔴 Trigger Critical Alert</button>
      <button onclick="triggerWarningAlert()" class="w-full bg-[#FF9F1C] text-white py-6 rounded-3xl text-lg font-medium">⚠️ Trigger Warning Alert</button>
    </div>

    <!-- SIMPLE VSLA GROUP CHAT (original version) -->
    <div id="screen-vsla" class="screen hidden">
      <div class="p-4 border-b bg-white">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-[#FF9F1C] rounded-2xl flex items-center justify-center text-white text-2xl">👥</div>
          <div>
            <p class="heading font-semibold">Mukono Women VSLA</p>
            <p class="text-xs opacity-70">18 members</p>
          </div>
        </div>
      </div>
      <div class="h-[calc(100vh-260px)] overflow-y-auto p-4 space-y-4" id="vsla-messages"></div>
      <div class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white p-4 border-t">
        <div class="flex gap-2">
          <input id="vsla-input" type="text" placeholder="Message the group..." class="flex-1 bg-white border border-gray-300 rounded-3xl px-6 py-4 outline-none">
          <button onclick="sendGroupMessage()" class="w-14 h-14 bg-[#00A651] rounded-3xl flex items-center justify-center text-white text-2xl">↑</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white border-t">
    <div class="flex text-xs">
      <button onclick="showScreen('chat')" class="flex-1 py-3 nav-active flex flex-col items-center gap-1 text-[#00A651]" id="nav-chat"><i class="fa-solid fa-comment-dots text-xl"></i><span>Chat</span></button>
      <button onclick="showScreen('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-dashboard"><i class="fa-solid fa-chart-line text-xl"></i><span>Revenue</span></button>
      <button onclick="showScreen('alerts')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-alerts"><i class="fa-solid fa-shield-halved text-xl"></i><span>Security</span></button>
      <button onclick="showScreen('vsla')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-vsla"><i class="fa-solid fa-users text-xl"></i><span>VSLA</span></button>
    </div>
  </nav>

  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#00A651', accent: '#FF9F1C' } } } };

    let currentPersona = 'Mama Amina';
    let messages = [{ type: 'ai', text: 'Good morning Mama Amina 👋 Your savings balance is 248,500 UGX.' }];
    let vslaMessages = [{ from: 'Grace', text: 'Good morning sisters! Did everyone receive their share-out?' }];

    function renderChat() {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '';
      messages.forEach(m => {
        const div = document.createElement('div');
        div.className = m.type === 'ai' ? 'chat-bubble-ai ml-auto rounded-3xl rounded-tr-none px-5 py-3 max-w-[80%]' : 'chat-bubble-user mr-auto rounded-3xl rounded-tl-none px-5 py-3 max-w-[80%]';
        div.textContent = m.text;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    function renderVSLA() {
      const container = document.getElementById('vsla-messages');
      container.innerHTML = '';
      vslaMessages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'chat-bubble-member mr-auto rounded-3xl rounded-tl-none px-5 py-3 max-w-[80%]';
        div.innerHTML = `<small class="opacity-70">${m.from}</small><br>${m.text}`;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() { /* simple version */ }
    function simulateVoice() { /* simple version */ }
    function showUSSD() { alert('USSD *123# simulator opened'); }
    function sendGroupMessage() {
      const input = document.getElementById('vsla-input');
      if (input.value) {
        vslaMessages.push({ from: currentPersona, text: input.value });
        renderVSLA();
        input.value = '';
      }
    }

    function togglePersona() {
      currentPersona = currentPersona === 'Mama Amina' ? 'Joseph' : 'Mama Amina';
      document.getElementById('persona-name').textContent = currentPersona;
    }

    function showScreen(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(`screen-${screen}`).classList.remove('hidden');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
      document.getElementById(`nav-${screen}`).classList.add('nav-active');
      if (screen === 'vsla') renderVSLA();
    }

    window.onload = () => {
      renderChat();
      showScreen('chat');
    };
  </script>
</body>
</html>
