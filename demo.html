<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SACCO Assistant - Live Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
    .chat-bubble-ai { background: #008000; color: white; }
    .chat-bubble-user { background: #FF6600; color: white; }
    .chat-bubble-member { background: #2C3E5F; color: white; }
    .nav-active { border-top: 3px solid #008000; }
  </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-[#1E2A44] text-[#1E2A44] dark:text-[#F0F4F8] min-h-screen pb-20">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 right-0 bg-white dark:bg-[#2C3E5F] border-b z-50">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-[#008000] rounded-xl flex items-center justify-center text-white text-xl">🌱</div>
        <span class="heading text-2xl font-bold text-[#008000]">SACCO Assistant</span>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="togglePersona()" id="persona-btn" class="flex items-center gap-1.5 text-sm font-medium px-3 py-1 rounded-full bg-[#F8FAFC] dark:bg-[#2C3E5F]">
          <span id="persona-name">Mama Amina</span>
        </button>
        <button onclick="toggleDark()" class="w-9 h-9 flex items-center justify-center text-2xl rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700">🌙</button>
      </div>
    </div>
  </header>

  <div class="max-w-xl mx-auto pt-16">

    <!-- PERSONAL CHAT -->
    <div id="screen-chat" class="screen">
      <div class="h-[calc(100vh-180px)] overflow-y-auto p-4 space-y-4" id="chat-messages"></div>
      <!-- input area same as before -->
      <div class="fixed bottom-20 left-0 right-0 max-w-xl mx-auto bg-white dark:bg-[#2C3E5F] border-t p-4">
        <div class="flex gap-2">
          <button onclick="simulateVoice()" class="flex-1 bg-[#008000] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-microphone"></i> Voice
          </button>
          <button onclick="showUSSD()" class="flex-1 bg-[#FF6600] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-mobile-screen-button"></i> USSD
          </button>
        </div>
      </div>
      <div class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white dark:bg-[#2C3E5F] p-4 border-t">
        <div class="flex gap-2">
          <input id="chat-input" type="text" placeholder="Ask anything..." class="flex-1 bg-[#F8FAFC] dark:bg-[#1E2A44] rounded-3xl px-6 py-4 outline-none">
          <button onclick="sendMessage()" class="w-14 h-14 bg-[#008000] rounded-3xl flex items-center justify-center text-white text-2xl">↑</button>
        </div>
      </div>
    </div>

    <!-- REVENUE DASHBOARD (unchanged) -->
    <div id="screen-dashboard" class="screen hidden p-4 pt-6">
      <!-- [Your previous revenue code – unchanged] -->
      <!-- ... paste your existing dashboard content here ... -->
    </div>

    <!-- SECURITY (unchanged) -->
    <div id="screen-alerts" class="screen hidden p-4 pt-6">
      <!-- [Your previous security code – unchanged] -->
    </div>

    <!-- NEW: VSLA GROUP CHAT -->
    <div id="screen-vsla" class="screen hidden">
      <div class="p-4 border-b bg-white dark:bg-[#2C3E5F]">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-[#FF6600] rounded-2xl flex items-center justify-center text-white text-2xl">👥</div>
          <div>
            <p class="heading font-semibold">Mukono Women VSLA</p>
            <p class="text-xs opacity-70">18 members • Active now</p>
          </div>
        </div>
      </div>

      <div class="h-[calc(100vh-260px)] overflow-y-auto p-4 space-y-4" id="vsla-messages">
        <!-- JS injected group messages -->
      </div>

      <div class="fixed bottom-20 left-0 right-0 max-w-xl mx-auto bg-white dark:bg-[#2C3E5F] border-t p-4">
        <div class="flex gap-3">
          <button onclick="sendVoiceToGroup()" class="flex-1 bg-[#008000] text-white py-4 rounded-3xl flex items-center justify-center gap-2">
            <i class="fa-solid fa-microphone"></i> Voice Note
          </button>
          <button onclick="callGroupMeeting()" class="flex-1 border-2 border-[#FF6600] text-[#FF6600] py-4 rounded-3xl">📞 Call Meeting</button>
        </div>
      </div>

      <div class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white dark:bg-[#2C3E5F] p-4 border-t">
        <div class="flex gap-2">
          <input id="vsla-input" type="text" placeholder="Message the group..." class="flex-1 bg-[#F8FAFC] dark:bg-[#1E2A44] rounded-3xl px-6 py-4 outline-none">
          <button onclick="sendGroupMessage()" class="w-14 h-14 bg-[#008000] rounded-3xl flex items-center justify-center text-white text-2xl">↑</button>
        </div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV – now 4 tabs -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white dark:bg-[#2C3E5F] border-t">
    <div class="flex text-xs">
      <button onclick="showScreen('chat')" class="flex-1 py-3 nav-active flex flex-col items-center gap-1 text-[#008000]" id="nav-chat"><i class="fa-solid fa-comment-dots text-xl"></i><span>Chat</span></button>
      <button onclick="showScreen('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-dashboard"><i class="fa-solid fa-chart-line text-xl"></i><span>Revenue</span></button>
      <button onclick="showScreen('alerts')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-alerts"><i class="fa-solid fa-shield-halved text-xl"></i><span>Security</span></button>
      <button onclick="showScreen('vsla')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-vsla"><i class="fa-solid fa-users text-xl"></i><span>VSLA</span></button>
    </div>
  </nav>

  <!-- OFFLINE BANNER -->
  <div class="fixed top-16 left-4 right-4 bg-amber-100 dark:bg-amber-900 text-amber-800 dark:text-amber-200 text-xs px-4 py-2 rounded-2xl flex items-center gap-2 shadow">
    <i class="fa-solid fa-cloud-arrow-down"></i> Offline mode – last 7 days cached
  </div>

  <script>
    // ... (keep all your previous JS for personal chat, revenue, security, etc.)

    // NEW VSLA Group Chat Data
    let vslaMessages = [
      { from: "Grace", text: "Good morning sisters! Did everyone receive their share-out this month? 💰", time: "09:12" },
      { from: "AI Assistant", text: "✅ 14 of 18 members confirmed. 4 still pending. Shall I send USSD reminder?", time: "09:15" },
      { from: "Mama Amina", text: "Ndagenda okusubiza 20,000 UGX leo. Asante!", time: "09:20" },
      { from: "Joseph", text: "Group loan repayment due in 3 days. Total due: 185,000 UGX", time: "09:25" }
    ];

    function renderVSLA() {
      const container = document.getElementById('vsla-messages');
      container.innerHTML = '';
      vslaMessages.forEach(msg => {
        const div = document.createElement('div');
        if (msg.from === "AI Assistant") {
          div.className = 'chat-bubble-ai ml-auto max-w-[80%] rounded-3xl rounded-tr-none px-5 py-3';
        } else if (msg.from === currentPersona) {
          div.className = 'chat-bubble-user mr-auto max-w-[80%] rounded-3xl rounded-tl-none px-5 py-3';
        } else {
          div.className = 'chat-bubble-member mr-auto max-w-[80%] rounded-3xl rounded-tl-none px-5 py-3';
        }
        div.innerHTML = `<small class="opacity-70 block text-xs">${msg.from} • ${msg.time}</small>${msg.text}`;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    function sendGroupMessage() {
      const input = document.getElementById('vsla-input');
      if (!input.value.trim()) return;
      vslaMessages.push({ from: currentPersona, text: input.value, time: "now" });
      renderVSLA();
      input.value = '';

      // AI replies sometimes
      if (Math.random() > 0.6) {
        setTimeout(() => {
          vslaMessages.push({ from: "AI Assistant", text: "Got it! I'll record that for the group savings log.", time: "now" });
          renderVSLA();
        }, 900);
      }
    }

    function sendVoiceToGroup() {
      vslaMessages.push({ from: currentPersona, text: "🎤 Voice note: Ndagenda okusubiza share-out yange leo!", time: "now" });
      renderVSLA();
      setTimeout(() => {
        vslaMessages.push({ from: "AI Assistant", text: "✅ Voice note transcribed and shared with the group. Asante!", time: "now" });
        renderVSLA();
      }, 1200);
    }

    function callGroupMeeting() {
      alert("📞 Group voice call started!\n\n(Mukono Women VSLA meeting in progress)\n\nIn real app this would open WebRTC or USSD conference.");
    }

    // Extend showScreen
    const originalShowScreen = showScreen;
    window.showScreen = function(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(`screen-${screen}`).classList.remove('hidden');
      
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
      document.getElementById(`nav-${screen}`).classList.add('nav-active');

      if (screen === 'vsla') renderVSLA();
    };

    // Init (add this at the end of your existing window.onload)
    window.onload = () => {
      // ... your existing init code ...
      renderChat();
      showScreen('chat');
      console.log('%cSACCO Assistant Demo with VSLA Group Chat ready – DNA fully respected ✅', 'color:#008000; font-weight:bold');
    };
  </script>
</body>
</html>
