<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SACCO Assistant - Live Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
    .chat-bubble-ai { background: #00A651; color: white; }
    .chat-bubble-user { background: #FF9F1C; color: white; }
    .chat-bubble-member { background: #1E2A44; color: white; }
    .nav-active { border-top: 3px solid #00A651; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E2A44] min-h-screen pb-20">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 right-0 bg-white border-b z-50">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-[#00A651] rounded-xl flex items-center justify-center text-white text-xl">🌱</div>
        <span class="heading text-2xl font-bold text-[#00A651]">SACCO Assistant</span>
      </div>
      <button onclick="togglePersona()" id="persona-btn" class="flex items-center gap-1.5 text-sm font-medium px-3 py-1 rounded-full bg-[#F8FAFC]">
        <span id="persona-name">Mama Amina</span>
      </button>
    </div>
  </header>

  <div class="max-w-xl mx-auto pt-16">

    <!-- PERSONAL CHAT -->
    <div id="screen-chat" class="screen">
      <div class="p-4 border-b bg-white flex justify-center">
        <button onclick="showScreen('calculator')" 
          class="bg-[#00A651] text-white px-8 py-4 rounded-3xl flex items-center gap-3 font-medium">
          🧮 SACCO Loan Calculator
        </button>
      </div>
      <div class="h-[calc(100vh-220px)] overflow-y-auto p-4 space-y-4" id="chat-messages"></div>
      <!-- bottom input area same as before -->
      <div class="fixed bottom-20 left-0 right-0 max-w-xl mx-auto bg-white border-t p-4">
        <div class="flex gap-2">
          <button onclick="simulateVoice()" class="flex-1 bg-[#00A651] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-microphone"></i> Voice
          </button>
          <button onclick="showUSSD()" class="flex-1 bg-[#FF9F1C] text-white py-4 rounded-3xl flex items-center justify-center gap-2 text-lg">
            <i class="fa-solid fa-mobile-screen-button"></i> USSD
          </button>
        </div>
      </div>
      <div class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white p-4 border-t">
        <div class="flex gap-2">
          <input id="chat-input" type="text" placeholder="Ask anything..." class="flex-1 bg-white border border-gray-300 rounded-3xl px-6 py-4 outline-none text-base">
          <button onclick="sendMessage()" class="w-14 h-14 bg-[#00A651] rounded-3xl flex items-center justify-center text-white text-2xl">↑</button>
        </div>
      </div>
    </div>

    <!-- REVENUE & SECURITY (unchanged) -->
    <div id="screen-dashboard" class="screen hidden p-4 pt-6">...</div>
    <div id="screen-alerts" class="screen hidden p-4 pt-6">...</div>

    <!-- SIMPLE VSLA (unchanged) -->
    <div id="screen-vsla" class="screen hidden">...</div>

    <!-- NEW: SACCO LOAN CALCULATOR -->
    <div id="screen-calculator" class="screen hidden p-4">
      <div class="flex items-center justify-between mb-6">
        <button onclick="showScreen('chat')" class="text-[#00A651] font-medium flex items-center gap-2">
          ← Back to Chat
        </button>
        <h1 class="heading text-2xl font-bold text-[#00A651]">Loan Calculator</h1>
      </div>

      <div class="bg-white rounded-3xl p-6">
        <div class="space-y-6">
          <div>
            <label class="block text-sm opacity-70 mb-2">Loan Amount (UGX)</label>
            <input id="loan-amount" type="number" value="500000" class="w-full border border-gray-300 rounded-3xl px-6 py-5 text-2xl">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm opacity-70 mb-2">Term (months)</label>
              <input id="loan-term" type="number" value="12" class="w-full border border-gray-300 rounded-3xl px-6 py-5 text-2xl">
            </div>
            <div>
              <label class="block text-sm opacity-70 mb-2">Monthly Interest %</label>
              <input id="loan-rate" type="number" step="0.1" value="1.5" class="w-full border border-gray-300 rounded-3xl px-6 py-5 text-2xl">
            </div>
          </div>

          <button onclick="calculateLoan()" 
            class="w-full bg-[#00A651] text-white py-6 rounded-3xl font-semibold text-lg">Calculate Repayment</button>
        </div>

        <div id="loan-results" class="hidden mt-8 pt-8 border-t">
          <div class="space-y-4 text-lg">
            <div class="flex justify-between"><span class="opacity-70">Processing fee (1%)</span><span id="processing" class="font-medium"></span></div>
            <div class="flex justify-between"><span class="opacity-70">Total Interest</span><span id="interest" class="font-medium"></span></div>
            <div class="flex justify-between border-t pt-4"><span class="font-semibold">Monthly Payment</span><span id="monthly" class="text-3xl font-bold text-[#00A651]"></span></div>
            <div class="flex justify-between"><span class="opacity-70">Total to Repay</span><span id="total" class="font-medium"></span></div>
          </div>

          <button onclick="applyForLoan()" 
            class="mt-10 w-full bg-[#FF9F1C] text-white py-6 rounded-3xl font-semibold text-lg">Apply for this Loan</button>
        </div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white border-t">
    <div class="flex text-xs">
      <button onclick="showScreen('chat')" class="flex-1 py-3 nav-active flex flex-col items-center gap-1 text-[#00A651]" id="nav-chat"><i class="fa-solid fa-comment-dots text-xl"></i><span>Chat</span></button>
      <button onclick="showScreen('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-dashboard"><i class="fa-solid fa-chart-line text-xl"></i><span>Revenue</span></button>
      <button onclick="showScreen('alerts')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-alerts"><i class="fa-solid fa-shield-halved text-xl"></i><span>Security</span></button>
      <button onclick="showScreen('vsla')" class="flex-1 py-3 flex flex-col items-center gap-1" id="nav-vsla"><i class="fa-solid fa-users text-xl"></i><span>VSLA</span></button>
    </div>
  </nav>

  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#00A651', accent: '#FF9F1C' } } } };

    let currentPersona = 'Mama Amina';
    let messages = [{ type: 'ai', text: 'Good morning Mama Amina 👋 Your savings balance is 248,500 UGX.' }];

    function renderChat() {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '';
      messages.forEach(m => {
        const div = document.createElement('div');
        div.className = m.type === 'ai' ? 'chat-bubble-ai ml-auto rounded-3xl rounded-tr-none px-5 py-3 max-w-[80%]' : 'chat-bubble-user mr-auto rounded-3xl rounded-tl-none px-5 py-3 max-w-[80%]';
        div.textContent = m.text;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    function calculateLoan() {
      const amount = parseFloat(document.getElementById('loan-amount').value) || 0;
      const term = parseFloat(document.getElementById('loan-term').value) || 12;
      const rate = parseFloat(document.getElementById('loan-rate').value) || 1.5;

      const processing = amount * 0.01;
      const totalInterest = amount * (rate / 100) * term;
      const totalRepay = amount + processing + totalInterest;
      const monthly = totalRepay / term;

      document.getElementById('processing').textContent = processing.toLocaleString() + ' UGX';
      document.getElementById('interest').textContent = totalInterest.toLocaleString() + ' UGX';
      document.getElementById('monthly').textContent = monthly.toLocaleString() + ' UGX';
      document.getElementById('total').textContent = totalRepay.toLocaleString() + ' UGX';

      document.getElementById('loan-results').classList.remove('hidden');
    }

    function applyForLoan() {
      const amount = document.getElementById('loan-amount').value || '500000';
      const term = document.getElementById('loan-term').value || '12';
      messages.push({ type: 'user', text: `I want to apply for ${amount} UGX loan for ${term} months` });
      renderChat();
      showScreen('chat');
      setTimeout(() => {
        messages.push({ type: 'ai', text: '✅ Application received! I will review your eligibility and get back in a moment.' });
        renderChat();
      }, 800);
    }

    function showScreen(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(`screen-${screen}`).classList.remove('hidden');
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
      if (document.getElementById(`nav-${screen}`)) document.getElementById(`nav-${screen}`).classList.add('nav-active');
    }

    // Simple placeholders for other functions
    function sendMessage() { alert("Message sent (demo)"); }
    function simulateVoice() { alert("Voice message sent"); }
    function showUSSD() { alert("USSD opened"); }
    function togglePersona() {
      currentPersona = currentPersona === 'Mama Amina' ? 'Joseph' : 'Mama Amina';
      document.getElementById('persona-name').textContent = currentPersona;
    }

    window.onload = () => {
      renderChat();
      showScreen('chat');
    };
  </script>
</body>
</html>
