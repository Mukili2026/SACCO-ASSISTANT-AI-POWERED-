<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SACCO Assistant - Live Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heading { font-family: 'Poppins', sans-serif; }
    .chat-bubble-ai { background: #008000; color: white; }
    .chat-bubble-user { background: #FF6600; color: white; }
    .chat-bubble-member { background: #2C3E5F; color: white; }
    .nav-active { border-top: 3px solid #008000; }
  </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-[#1E2A44] text-[#1E2A44] dark:text-[#F0F4F8] min-h-screen pb-20">

  <!-- HEADER, SCREENS, MODALS, NAV (exactly the same as last version with Poll + Loan Request) -->
  <!-- [Copy the entire <body> content from the previous demo.html you have – nothing changed in HTML] -->

  <script>
    // ============== MOCK REST API LAYER (localStorage + delay) ==============
    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    const mockAPI = {
      async getUserBalance() {
        await delay(350);
        let data = JSON.parse(localStorage.getItem('userBalance') || '{"savings":248500,"loanBalance":320000}');
        return data;
      },
      async repayLoan(amount) {
        await delay(650);
        let bal = await this.getUserBalance();
        bal.savings -= amount;
        bal.loanBalance -= amount;
        localStorage.setItem('userBalance', JSON.stringify(bal));

        // Update revenue with 0.5% charge
        let rev = JSON.parse(localStorage.getItem('revenue') || '{"subscription":450000,"transaction":320000,"loanCharges":180000,"insurance":150000}');
        rev.loanCharges = (rev.loanCharges || 0) + Math.round(amount * 0.005);
        localStorage.setItem('revenue', JSON.stringify(rev));

        return bal;
      },
      async getRevenue() {
        await delay(300);
        return JSON.parse(localStorage.getItem('revenue') || '{"subscription":450000,"transaction":320000,"loanCharges":180000,"insurance":150000}');
      },
      async getVSLAData() {
        await delay(400);
        return JSON.parse(localStorage.getItem('vslaData') || '{"groupLoans":[],"pollVotes":{"nextWeek":13,"twoWeeks":3,"endMonth":3}}');
      },
      async submitGroupLoan(amount, purpose) {
        await delay(700);
        let vsla = await this.getVSLAData();
        vsla.groupLoans.push({id: Date.now(), amount: parseInt(amount), purpose, status: "Pre-approved", date: new Date().toISOString().slice(0,10)});
        localStorage.setItem('vslaData', JSON.stringify(vsla));
        return vsla.groupLoans[vsla.groupLoans.length-1];
      },
      async votePoll(option) {
        await delay(250);
        let vsla = await this.getVSLAData();
        if (option === 0) vsla.pollVotes.nextWeek++;
        else if (option === 1) vsla.pollVotes.twoWeeks++;
        else vsla.pollVotes.endMonth++;
        localStorage.setItem('vslaData', JSON.stringify(vsla));
        return vsla.pollVotes;
      }
    };

    // Show toast
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-[#008000] text-white px-6 py-3 rounded-3xl text-sm shadow-xl flex items-center gap-2 z-[200]';
      toast.innerHTML = `✅ ${msg} <span class="text-xs opacity-75">(mock API)</span>`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }

    // ============== EXISTING SCREENS + API INTEGRATION ==============
    let currentPersona = 'Mama Amina';
    let messages = [ /* your previous messages */ ];
    let vslaMessages = [ /* your previous VSLA messages */ ];

    // Example: Repay in personal chat now uses API
    async function sendMessage() {
      const input = document.getElementById('chat-input');
      if (!input.value.trim()) return;
      messages.push({ type: 'user', text: input.value });
      renderChat();

      if (input.value.toLowerCase().includes('repay') || input.value.toLowerCase().includes('lipa')) {
        const amount = 50000;
        const newBal = await mockAPI.repayLoan(amount);
        showToast(`Repaid ${amount} UGX via MoMo`);
        setTimeout(() => {
          messages.push({ type: 'ai', text: `✅ Confirmed! New savings: ${newBal.savings.toLocaleString()} UGX | Loan: ${newBal.loanBalance.toLocaleString()} UGX` });
          renderChat();
        }, 800);
      } else {
        // normal reply
      }
      input.value = '';
    }

    // VSLA loan request now uses API
    async function submitGroupLoan() {
      const amount = document.getElementById('loan-amount').value || "150000";
      const purpose = document.getElementById('loan-purpose').value || "Group farming";
      const loan = await mockAPI.submitGroupLoan(amount, purpose);
      vslaMessages.push({ from: currentPersona, text: `📋 Group loan request: ${loan.amount} UGX for ${loan.purpose}`, time: "now" });
      renderVSLA();
      document.getElementById('loan-modal').classList.add('hidden');
      showToast('Group loan submitted to VSLA');
      setTimeout(() => {
        vslaMessages.push({ from: "AI Assistant", text: `✅ Pre-approved! ${loan.amount} UGX recorded (0.5% charge applied).`, time: "now" });
        renderVSLA();
      }, 900);
    }

    // Poll now uses API
    async function votePoll(n) {
      const votes = await mockAPI.votePoll(n);
      alert(`✅ Vote recorded!\nNext week: ${votes.nextWeek} • In 2 weeks: ${votes.twoWeeks} • End of month: ${votes.endMonth}`);
    }

    // Dashboard now loads from API
    async function loadDashboard() {
      const rev = await mockAPI.getRevenue();
      // update DOM elements with rev.subscription, rev.loanCharges etc.
      // (you can expand this)
      console.log('Revenue loaded from mock API:', rev);
    }

    // Extend showScreen
    const originalShowScreen = showScreen || function(){};
    window.showScreen = function(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(`screen-${screen}`).classList.remove('hidden');
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('nav-active'));
      document.getElementById(`nav-${screen}`).classList.add('nav-active');
      if (screen === 'vsla') renderVSLA();
      if (screen === 'dashboard') loadDashboard();
    };

    // Init
    window.onload = async () => {
      renderChat();
      renderVSLA();
      showScreen('chat');
      await loadDashboard();
      console.log('%cSACCO Assistant + Mock Backend API ready – Data now persistent ✅', 'color:#008000; font-weight:bold');
    };
  </script>
</body>
</html>
